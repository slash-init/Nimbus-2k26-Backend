services:
  - type: web
    name: nimbus-2k26-backend
    env: node
    region: singapore  # closest to India — change to oregon/frankfurt if preferred
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # you will paste this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
